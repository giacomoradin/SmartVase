name: Generate Documentation

# Generates the Doxygen documentation on every push to main and publishes it on GitHub Pages.
# Single source of truth: the Doxygen comments in the code + the Doxyfile in the repo root.
# The HTML is a build artifact: it is NOT committed (it is in .gitignore); this Action
# regenerates it and Pages serves it. One-time activation:
#   Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Pinned versions for reproducible builds (aligned with the local docs).
env:
  DOXYGEN_VERSION: "1.10.0"
  DOXYGEN_AWESOME_VERSION: "v2.3.4"

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages publication at a time; does not interrupt an in-flight deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Graphviz (dot)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Doxygen ${{ env.DOXYGEN_VERSION }} (pinned)
        run: |
          wget -q "https://www.doxygen.nl/files/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          tar xzf "doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          sudo cp "doxygen-${DOXYGEN_VERSION}/bin/doxygen" /usr/local/bin/
          doxygen --version

      - name: Fetch doxygen-awesome-css ${{ env.DOXYGEN_AWESOME_VERSION }} (pinned, non-fatal)
        run: |
          # The theme is an extra: if the fetch fails (network blip), Doxygen
          # falls back to the default theme and the deploy proceeds anyway.
          curl -sSfL -o docs/doxygen-theme/doxygen-awesome.css \
            "https://raw.githubusercontent.com/jothepro/doxygen-awesome-css/${DOXYGEN_AWESOME_VERSION}/doxygen-awesome.css" \
            || echo "::warning::doxygen-awesome.css fetch failed; falling back to default theme"

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/doxygen/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
