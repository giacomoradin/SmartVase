[env:esp32cam]
platform = espressif32
board    = esp32cam
framework = arduino
monitor_rts = 0
monitor_dtr = 0
monitor_speed = 115200

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    bblanchon/ArduinoJson @ ^6.19.4
    knolleary/PubSubClient @ ^2.8
; FirebaseClient 2.2.9 (+ its ESP_SSLClient 2.1.12 dependency) is vendored in
; lib/ : the registry spec below broke the offline build on the dev machine
; (registry unreachable -> HTTPClientError). Restore the line if/when the
; registry is reachable and the vendored copies are removed.
;   mobizt/FirebaseClient @ ^2.2.9
