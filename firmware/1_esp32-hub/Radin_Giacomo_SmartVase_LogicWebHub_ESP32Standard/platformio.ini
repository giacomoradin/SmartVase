    ; =================================================================
; PlatformIO Project Configuration File
; SmartVase - ESP32 Hub
;
; v1.2 - Corrette dipendenze AsyncTCP e WebServer ai repo ufficiali ESP32Async
; =================================================================

[env:esp32dev]
; --- Piattaforma e Scheda ---
platform = espressif32
framework = arduino
board = esp32dev

; --- Opzioni di Compilazione ---
build_flags =
    -D CORE_DEBUG_LEVEL=4
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    ; Bench: usa secrets.h come fallback se la NVS e' vuota. Rimuovere in produzione.
    -D SV_BENCH_MODE
    
; --- Opzioni Serial Monitor ---
monitor_speed = 115200

; --- Sync file condivisi dalla fonte canonica infra/ (pre-build) ---
extra_scripts = pre:../../../infra/smartvase-proto/sync_to_firmware.py

; --- Librerie e Dipendenze ---
; Usiamo i nomi ufficiali trovati da Giacomo
lib_deps =
    ; Dipendenza #1: La libreria TCP asincrona UFFICIALE
    ESP32Async/AsyncTCP @ ^3.3.2  ; <-- CORRETTO!

    ; Dipendenza #2: Il web server asincrono UFFICIALE (dipende dalla precedente)
    ESP32Async/ESPAsyncWebServer @ ^3.6.0 ; <-- CORRETTO!

    ; Per la traduzione in JSON (da/per MQTT)
    bblanchon/ArduinoJson@^6.19.4

    ; Per la comunicazione MQTT
    knolleary/PubSubClient@^2.8

; --- Opzioni Upload ---
; upload_port = COM3

