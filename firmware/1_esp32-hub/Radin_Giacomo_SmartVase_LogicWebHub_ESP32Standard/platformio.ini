    ; =================================================================
; PlatformIO Project Configuration File
; SmartVase - ESP32 Hub
;
; v1.2 - Corrette dipendenze AsyncTCP e WebServer ai repo ufficiali ESP32Async
; =================================================================

[env:esp32dev]
; --- Piattaforma e Scheda ---
platform = espressif32
framework = arduino
board = esp32dev

; --- Opzioni di Compilazione ---
build_flags =
    -D CORE_DEBUG_LEVEL=4
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    ; Bench: usa secrets.h come fallback se la NVS e' vuota. Rimuovere in produzione.
    -D SV_BENCH_MODE
    
; --- Serial Monitor options ---
monitor_speed = 115200

; --- Sync of shared files from the canonical source infra/ (pre-build) ---
extra_scripts = pre:../../../infra/smartvase-proto/sync_to_firmware.py

; --- Libraries and dependencies ---
lib_deps =
    ; Dependency #1: the OFFICIAL async TCP library
    ESP32Async/AsyncTCP @ ^3.3.2

    ; Dependency #2: the OFFICIAL async web server (depends on the previous one)
    ESP32Async/ESPAsyncWebServer @ ^3.6.0

    ; JSON serialization (to/from MQTT)
    bblanchon/ArduinoJson@^6.19.4

    ; Per la comunicazione MQTT
    knolleary/PubSubClient@^2.8

; --- Opzioni Upload ---
; upload_port = COM3

