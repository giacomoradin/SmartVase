// Author: Giacomo Radin
// Version 4.1 (2026-07-02): Autonomous care KPIs in TelemetryDeep
// - TelemetryDeep: added daily counters from the Mega's care layer
//   (tags 22-27, appended for compatibility with v4.0 decoders): care state,
//   light budget %, relocations, water doses, UVA minutes, enable flag.
// Version 4.0 (2026-05-19): Total refactor for the new prototype
// - TelemetryFast: 5 navigation distances (US1, US2, US3, US5, US6)
//   + water level (US4) + soil moisture (A0 fork) + lux + state + ts
// - TelemetryDeep: added epoch_s from RTC DS3232
// - CommandResponse: added 'value' field for responses with numeric payload
//   (e.g. ReadSoilCommand returns the current moisture value)
syntax = "proto3";

import "nanopb.proto";

package smartvase;

// ===================================================================
// Atomic Messages
// ===================================================================

// High-frequency telemetry (real-time sensors for navigation)
message TelemetryFast {
  // 5 HC-SR04 sensors for navigation and obstacle avoidance
  float top_dist_cm           = 1;  // US1 - front top
  float front_right_dist_cm   = 2;  // US2 - front right
  float front_left_dist_cm    = 3;  // US3 - front left
  float left_dist_cm          = 4;  // US5 - left side
  float right_dist_cm         = 5;  // US6 - right side

  // US4 - water level in the tank
  float water_level_cm        = 6;

  // Soil moisture (fork on A0). Raw ADC range 0..1023.
  int32 soil_moisture         = 7;

  // Ambient light (photoresistor on A1). Raw ADC range 0..1023.
  int32 lux                   = 8;

  // Current state of the movement state machine
  MovementState movement_state = 9;

  // Unix epoch timestamp (s) from the DS3232 RTC (0 if RTC not available)
  uint32 epoch_s              = 10;

  string device_id            = 11 [(nanopb).max_size = 16];
}

// Low-frequency telemetry (environmental sensors + cumulative statistics)
message TelemetryDeep {
  // BME680 (I2C 0x76)
  float temperature_c          = 1;
  float humidity_percent       = 2;
  float pressure_hpa           = 3;
  uint32 gas_resistance_ohms   = 4;

  // System state
  uint32 uptime_s              = 5;
  uint32 free_ram_bytes        = 6;
  uint32 epoch_s               = 7;   // from RTC

  // Cumulative counters (persisted in EEPROM)
  uint32 watchdog_resets       = 8;
  uint32 total_irrigations     = 9;
  uint32 obstacles_avoided     = 10;
  uint32 stuck_events          = 11;
  uint32 bme_read_errors       = 12;
  uint32 log_overflows         = 13;
  uint32 total_irrigation_duration_s = 14;
  uint32 total_motor_active_time_s   = 15;
  uint32 pb_decode_failures    = 16;

  string device_id             = 17 [(nanopb).max_size = 16];

  // Battery (disabled until the resistive divider is wired).
  // When active: VBATT voltage in volts after divider.
  float battery_voltage        = 18;

  // Additional cumulative counters: previously calculated in Movement/stats but never
  // published in telemetry. Appended (tags 19-21) for compatibility.
  uint32 light_seeking_sessions  = 19;
  uint32 shadow_seeking_sessions = 20;
  uint32 escape_attempts         = 21;

  // Autonomous care KPIs (v4.1, 2026-07-02): DAILY counters calculated
  // by the Mega's care layer (Care/CarePolicy, see docs/Plant_Care_Design.md).
  // Appended (tags 22-27) for compatibility with v4.0 decoders.
  bool   care_enabled            = 22;  // true if autonomous care is active
  uint32 care_state              = 23;  // CareState: 0=NIGHT 1=SEEK_SUN 2=BASK 3=SEEK_SHADE 4=SHELTER 5=TOP_UP
  uint32 light_budget_pct        = 24;  // % of daily light target reached (can exceed 100)
  uint32 relocations_today       = 25;  // seeking sessions started today
  uint32 water_doses_today       = 26;  // irrigation doses delivered today
  uint32 growlight_minutes_today = 27;  // UVA top-up minutes consumed today
}

message Log {
  enum LogLevel { INFO = 0; WARN = 1; ERROR = 2; CRITICAL = 3; }
  LogLevel level = 1;
  string event = 2 [(nanopb).max_size = 24];
  string detail = 3 [(nanopb).max_size = 32];
  uint32 timestamp_ms = 4;
  string source_device = 5 [(nanopb).max_size = 16];
}

message Heartbeat {
  uint32 uptime_s = 1;
  bool is_degraded = 2;
  string device_id = 3 [(nanopb).max_size = 16];
}

// ===================================================================
// Commands and Responses
// ===================================================================
message Command {
  uint32 cmd_id = 99;
  oneof command_type {
    WaterCommand water = 1;
    SetModeCommand set_mode = 2;
    StopCommand stop = 3;
    RequestDiagnosticsCommand request_diagnostics = 4;
    SetMotionParamsCommand set_motion_params = 5;
    ReadSoilCommand read_soil = 6;
    SoftResetCommand soft_reset = 7;
  }
}

message CommandResponse {
  enum Status { OK = 0; ERROR = 1; }
  Status status = 1;
  string detail = 2 [(nanopb).max_size = 64];
  // Optional numeric value (e.g. response to ReadSoilCommand)
  int32  value = 3;
  uint32 cmd_id = 99;
  uint32 exec_time_ms = 100;
}

// ===================================================================
// Specific Command Definitions
// ===================================================================
message WaterCommand {
  uint32 duration_ms = 1;
}

message SetModeCommand {
  enum Mode { IDLE = 0; LIGHT = 1; SHADOW = 2; }
  Mode mode = 1;
}

message SetMotionParamsCommand {
    uint32 reverse_ms = 1;
    uint32 turn_ms = 2;
}

message StopCommand {}
message RequestDiagnosticsCommand {}
message ReadSoilCommand {}
message SoftResetCommand {}

// ===================================================================
// Global Enums
// ===================================================================
enum MovementState {
  M_IDLE = 0; M_MOVING = 1; M_AVOID_START = 2; M_AVOID_REVERSING = 3; M_AVOID_TURNING = 4; M_STUCK = 5;
}

// ===================================================================
// Wrapper Message
// ===================================================================
message WrapperMessage {
  oneof payload {
    TelemetryFast telemetry_fast = 1;
    TelemetryDeep telemetry_deep = 2;
    Log log = 3;
    Command command = 4;
    CommandResponse command_response = 5;
    Heartbeat heartbeat = 6;
  }
}
