// Autore: Giacomo Radin
// Versione 4.0 (2026-05-19): Refactor totale per il nuovo prototipo
// - TelemetryFast: 5 distanze di navigazione (US1, US2, US3, US5, US6)
//   + livello acqua (US4) + umidita' suolo (forcella A0) + lux + stato + ts
// - TelemetryDeep: aggiunto epoch_s da RTC DS3232
// - CommandResponse: aggiunto campo 'value' per risposte con payload numerico
//   (es. ReadSoilCommand restituisce il valore corrente di umidita')
syntax = "proto3";

import "nanopb.proto";

package smartvase;

// ===================================================================
// Messaggi Atomici
// ===================================================================

// Telemetria ad alta frequenza (sensori in tempo reale per la navigazione)
message TelemetryFast {
  // 5 sensori HC-SR04 per navigazione e obstacle avoidance
  float top_dist_cm           = 1;  // US1 - frontale alto
  float front_right_dist_cm   = 2;  // US2 - frontale destro
  float front_left_dist_cm    = 3;  // US3 - frontale sinistro
  float left_dist_cm          = 4;  // US5 - laterale sinistro
  float right_dist_cm         = 5;  // US6 - laterale destro

  // US4 - livello acqua nella tanica
  float water_level_cm        = 6;

  // Umidita' del suolo (forcella su A0). Range ADC grezzo 0..1023.
  int32 soil_moisture         = 7;

  // Luminosita' ambientale (fotoresistore su A1). Range ADC grezzo 0..1023.
  int32 lux                   = 8;

  // Stato corrente della macchina a stati del movimento
  MovementState movement_state = 9;

  // Timestamp Unix epoch (s) dal RTC DS3232 (0 se RTC non disponibile)
  uint32 epoch_s              = 10;

  string device_id            = 11 [(nanopb).max_size = 16];
}

// Telemetria a bassa frequenza (sensori ambientali + statistiche cumulative)
message TelemetryDeep {
  // BME680 (I2C 0x76)
  float temperature_c          = 1;
  float humidity_percent       = 2;
  float pressure_hpa           = 3;
  uint32 gas_resistance_ohms   = 4;

  // Stato del sistema
  uint32 uptime_s              = 5;
  uint32 free_ram_bytes        = 6;
  uint32 epoch_s               = 7;   // da RTC

  // Contatori cumulativi (persistiti in EEPROM)
  uint32 watchdog_resets       = 8;
  uint32 total_irrigations     = 9;
  uint32 obstacles_avoided     = 10;
  uint32 stuck_events          = 11;
  uint32 bme_read_errors       = 12;
  uint32 log_overflows         = 13;
  uint32 total_irrigation_duration_s = 14;
  uint32 total_motor_active_time_s   = 15;
  uint32 pb_decode_failures    = 16;

  string device_id             = 17 [(nanopb).max_size = 16];

  // Batteria (disabilitato finche' non viene cablato il partitore resistivo).
  // Quando attivo: tensione VBATT in volt dopo divisore.
  float battery_voltage        = 18;

  // Contatori cumulativi aggiuntivi: prima calcolati in Movement/stats ma mai
  // pubblicati in telemetria. Aggiunti in coda (tag 19-21) per compatibilita'.
  uint32 light_seeking_sessions  = 19;
  uint32 shadow_seeking_sessions = 20;
  uint32 escape_attempts         = 21;
}

message Log {
  enum LogLevel { INFO = 0; WARN = 1; ERROR = 2; CRITICAL = 3; }
  LogLevel level = 1;
  string event = 2 [(nanopb).max_size = 24];
  string detail = 3 [(nanopb).max_size = 32];
  uint32 timestamp_ms = 4;
  string source_device = 5 [(nanopb).max_size = 16];
}

message Heartbeat {
  uint32 uptime_s = 1;
  bool is_degraded = 2;
  string device_id = 3 [(nanopb).max_size = 16];
}

// ===================================================================
// Comandi e Risposte
// ===================================================================
message Command {
  uint32 cmd_id = 99;
  oneof command_type {
    WaterCommand water = 1;
    SetModeCommand set_mode = 2;
    StopCommand stop = 3;
    RequestDiagnosticsCommand request_diagnostics = 4;
    SetMotionParamsCommand set_motion_params = 5;
    ReadSoilCommand read_soil = 6;
    SoftResetCommand soft_reset = 7;
  }
}

message CommandResponse {
  enum Status { OK = 0; ERROR = 1; }
  Status status = 1;
  string detail = 2 [(nanopb).max_size = 64];
  // Valore numerico opzionale (es. risposta a ReadSoilCommand)
  int32  value = 3;
  uint32 cmd_id = 99;
  uint32 exec_time_ms = 100;
}

// ===================================================================
// Definizioni dei Comandi Specifici
// ===================================================================
message WaterCommand {
  uint32 duration_ms = 1;
}

message SetModeCommand {
  enum Mode { IDLE = 0; LIGHT = 1; SHADOW = 2; }
  Mode mode = 1;
}

message SetMotionParamsCommand {
    uint32 reverse_ms = 1;
    uint32 turn_ms = 2;
}

message StopCommand {}
message RequestDiagnosticsCommand {}
message ReadSoilCommand {}
message SoftResetCommand {}

// ===================================================================
// Enums Globali
// ===================================================================
enum MovementState {
  M_IDLE = 0; M_MOVING = 1; M_AVOID_START = 2; M_AVOID_REVERSING = 3; M_AVOID_TURNING = 4; M_STUCK = 5;
}

// ===================================================================
// Messaggio Contenitore (Wrapper)
// ===================================================================
message WrapperMessage {
  oneof payload {
    TelemetryFast telemetry_fast = 1;
    TelemetryDeep telemetry_deep = 2;
    Log log = 3;
    Command command = 4;
    CommandResponse command_response = 5;
    Heartbeat heartbeat = 6;
  }
}
