[env:megaatmega2560]
platform = atmelavr
board    = megaatmega2560
framework = arduino

monitor_speed = 115200

; --- Sync of shared files from the canonical source infra/ (pre-build) ---
extra_scripts = pre:../../../infra/smartvase-proto/sync_to_firmware.py

build_flags =
    -Wno-unknown-pragmas
    -D SERIAL_RX_BUFFER_SIZE=256
    -D SERIAL_TX_BUFFER_SIZE=256

; HC-SR04 and DS3232 are handled by local drivers in src/ (Ultrasonic,
; RtcDs3232): no registry dependency, offline-friendly builds.
; Adafruit BME680 is only needed with BME680_ENABLED=1 in Sensors.h.
lib_deps =
    adafruit/Adafruit BME680 Library @ ^2.0.1
    paulstoffregen/Time @ ^1.6.1
