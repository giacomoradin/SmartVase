[env:megaatmega2560]
platform = atmelavr
board    = megaatmega2560
framework = arduino

monitor_speed = 115200
build_flags =
    -Wno-unknown-pragmas

; HC-SR04 e DS3232 sono gestiti da driver locali in src/ (Ultrasonic,
; RtcDs3232): nessuna dipendenza dal registry per build offline.
; Adafruit BME680 serve solo con BME680_ENABLED=1 in Sensors.h.
lib_deps =
    adafruit/Adafruit BME680 Library @ ^2.0.1
    paulstoffregen/Time @ ^1.6.1
